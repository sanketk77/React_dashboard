<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../scormdriver.js"></script>
    <script src="../APIWrapper.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Basics — Task Manager Project</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>

    <style>
        :root {
            --primary: #1a73e8;
            --primary-light: #e8f0fe;
            --primary-dark: #1557b0;
            --success: #1e8e3e;
            --success-light: #f1f8e9;
            --error: #d32f2f;
            --error-light: #ffebee;
            --bg: #f8f9fa;
            --bg-light: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --text-light: #80868b;
            --border: #dadce0;
            --code-bg: #282c34;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .logo-img { width: 160px; height: auto; }

        .sidebar-content {
            padding: 30px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .progress-section {
            background: linear-gradient(135deg, var(--primary-light) 0%, #f0f7ff 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .progress-label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; margin-bottom: 8px; }
        .progress-value { font-size: 24px; font-weight: 700; color: var(--primary); }

        .sidebar-nav { margin-top: auto; padding-bottom: 20px; }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 8px; padding: 12px 16px;
            text-decoration: none; color: var(--text-main); font-size: 14px; font-weight: 500;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
            max-width: 1100px;
        }

        .header { margin-bottom: 40px; animation: fadeInDown 0.5s ease; }
        .badge {
            display: inline-block; font-size: 11px; font-weight: 700; padding: 6px 14px;
            border-radius: 20px; background: var(--primary-light); color: var(--primary);
            margin-bottom: 16px; text-transform: uppercase;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-container { margin-bottom: 40px; }
        .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; position: relative; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: width 0.4s ease;
            position: relative;
        }
        .progress-fill::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* ===== TASK CARDS ===== */
        .challenge-card {
            background: var(--bg-light); border-radius: 16px; padding: 32px;
            box-shadow: var(--shadow); display: none; border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }
        .challenge-card.active { display: block; }

        .instruction-box {
            font-size: 16px; line-height: 1.6; color: var(--text-main);
            margin-bottom: 24px; padding: 20px; background: #f8f9fa;
            border-radius: 12px; border-left: 4px solid var(--primary);
        }

        /* ===== EDITOR ===== */
        .editor-wrapper { border: 2px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--code-bg); }
        .CodeMirror { font-family: 'Monaco', monospace; font-size: 14px; height: 250px; }

        /* ===== SOLUTION ===== */
        .solution-box {
            display: none; background: var(--success-light); padding: 24px;
            border-radius: 12px; border-left: 5px solid var(--success);
            margin-top: 24px; animation: slideDown 0.4s ease;
        }
        .sol-code { background: var(--code-bg); color: #abb2bf; padding: 16px; border-radius: 8px; font-size: 13px; margin: 10px 0; overflow-x: auto; white-space: pre; }

        /* ===== CONTROLS ===== */
        .nav-controls { display: flex; justify-content: space-between; gap: 16px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
        button { padding: 12px 28px; border-radius: 8px; border: 2px solid var(--border); background: white; cursor: pointer; font-weight: 600; transition: 0.3s; }
        button:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-light); transform: translateY(-2px); }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-success { background: var(--success); color: white; border: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header"><img src="jade_logo.webp" alt="Jade Logo" class="logo-img"></div>
    <div class="sidebar-content">
        <div class="progress-section">
            <div class="progress-label">📊 Project Completion</div>
            <div class="progress-value" id="status-text">0%</div>
        </div>
        <nav class="sidebar-nav">
            <a href="../index.html">← Exit to Dashboard</a>
        </nav>
    </div>
</div>

<div class="main-content">
    <div class="header">
        <div class="badge">💻 Practical Project</div>
        <h1>Building a React Task Manager</h1>
        <p>Implement core logic to build a fully functional Task Manager app using React foundations.</p>
    </div>

    <div class="progress-container">
        <div class="progress-bar"><div class="progress-fill" id="prog" style="width: 0%"></div></div>
    </div>

    <div id="challenges-container"></div>

    <div class="nav-controls">
        <button id="prev-btn" onclick="nav(-1)" disabled>← Previous Task</button>
        <button id="submit-btn" class="btn-success" onclick="showSolution()">Submit & Review →</button>
        <button id="next-btn" class="btn-primary" onclick="nav(1)" style="display:none">Next Task →</button>
    </div>
</div>

<script>
const CHALLENGES = [
    {
        title: "1. Create the App Component",
        task: "Define a functional component named 'TaskManager' that returns a div containing an h1 with the text 'My Tasks'.",
        sol: "const TaskManager = () => {\n  return (\n    <div>\n      <h1>My Tasks</h1>\n    </div>\n  );\n};",
        desc: "Every React app starts with a root component that returns JSX."
    },
    {
        title: "2. Initialize Task State",
        task: "Use the useState hook to create a 'tasks' array. Initialize it with two strings: 'Learn React' and 'Build App'.",
        sol: "const [tasks, setTasks] = useState(['Learn React', 'Build App']);",
        desc: "State allows components to remember data between renders."
    },
    {
        title: "3. Render a List",
        task: "Use the .map() method to loop through the 'tasks' state and render an <li> for each task inside a <ul>.",
        sol: "<ul>\n  {tasks.map((task, index) => (\n    <li key={index}>{task}</li>\n  ))}\n</ul>",
        desc: "The 'key' prop is required when rendering lists to help React track items."
    },
    {
        title: "4. Create an Input State",
        task: "Create a new state variable named 'input' using useState to track the text typed into a new task field.",
        sol: "const [input, setInput] = useState('');",
        desc: "Controlled components link input values to React state."
    },
    {
        title: "5. Handle Input Changes",
        task: "Write a function handleChange that updates the 'input' state whenever a user types in the text box.",
        sol: "const handleChange = (e) => {\n  setInput(e.target.value);\n};",
        desc: "Event handlers capture user interactions to update state."
    },
    {
        title: "6. Add Task Logic",
        task: "Write an addTask function that takes the current 'input' and adds it to the 'tasks' array, then clears the input.",
        sol: "const addTask = () => {\n  setTasks([...tasks, input]);\n  setInput('');\n};",
        desc: "Never mutate state directly; always create a new array using the spread operator."
    },
    {
        title: "7. Attach the Event Handler",
        task: "Create a <button> that calls the addTask function when clicked.",
        sol: "<button onClick={addTask}>Add Task</button>",
        desc: "onClick triggers functions in response to user clicks."
    },
    {
        title: "8. Conditional Empty State",
        task: "Use a ternary operator to show 'No tasks found' if the tasks array is empty.",
        sol: "{tasks.length === 0 ? <p>No tasks found</p> : <TaskList /> }",
        desc: "Conditional rendering allows UI to adapt based on data presence."
    },
    {
        title: "9. Pass Props to Sub-component",
        task: "Create a component 'TaskItem' and pass a 'title' prop to it from the parent TaskManager.",
        sol: "<TaskItem title={task} />\n\nconst TaskItem = (props) => <li>{props.title}</li>;",
        desc: "Props are used to pass data from parent to child components."
    },
    {
        title: "10. Implementation of Fragments",
        task: "Wrap your task input and list in a React Fragment to avoid extra div nodes in the DOM.",
        sol: "return (\n  <>\n    <input />\n    <ul>{/* list */}</ul>\n  </>\n);",
        desc: "Fragments group elements without adding extra nodes to the HTML tree."
    }
];

let current = 0;
let editors = {};

function build() {
    const container = document.getElementById('challenges-container');
    CHALLENGES.forEach((c, i) => {
        const div = document.createElement('div');
        div.className = 'challenge-card' + (i === 0 ? ' active' : '');
        div.id = 'task-' + i;
        div.innerHTML = `
            <div style="font-size:11px; font-weight:700; color:var(--primary); text-transform:uppercase; margin-bottom:12px;">Task ${i+1} of ${CHALLENGES.length}</div>
            <h2 style="margin-bottom:20px;">${c.title}</h2>
            <div class="instruction-box"><strong>Objective:</strong> ${c.task}</div>
            <div class="editor-wrapper">
                <textarea id="editor-${i}"></textarea>
            </div>
            <div class="solution-box" id="sol-${i}">
                <div style="font-weight:700; color:var(--success); margin-bottom:10px;">✓ Best Practice Solution:</div>
                <div class="sol-code">${c.sol}</div>
                <div style="font-size:13px; color:#0d652d; line-height:1.5; margin-top:10px;"><strong>Why:</strong> ${c.desc}</div>
            </div>
        `;
        container.appendChild(div);
    });
    initializeEditors();
}

function initializeEditors() {
    CHALLENGES.forEach((_, i) => {
        editors[i] = CodeMirror.fromTextArea(document.getElementById(`editor-${i}`), {
            mode: 'javascript',
            theme: 'dracula',
            lineNumbers: true,
            indentUnit: 2,
            lineWrapping: true
        });
    });
}

function showSolution() {
    document.getElementById('sol-' + current).style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'block';
}

function nav(dir) {
    document.getElementById('task-' + current).classList.remove('active');
    current += dir;
    document.getElementById('task-' + current).classList.add('active');
    
    document.getElementById('prev-btn').disabled = (current === 0);
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'block';
    
    const prog = Math.round((current / (CHALLENGES.length - 1)) * 100);
    document.getElementById('prog').style.width = prog + '%';
    document.getElementById('status-text').textContent = prog + '%';

    setTimeout(() => editors[current].refresh(), 50);

    if (current === CHALLENGES.length - 1) {
        document.getElementById('next-btn').textContent = "Complete Project Lab";
        document.getElementById('next-btn').onclick = () => {
            localStorage.setItem('react_basics_assign_completed', 'true');
            alert("Congratulations! Project Lab Completed.");
            window.location.href = '../index.html';
        };
    }
}

window.onload = function() {
    const postDone = localStorage.getItem('react_basics_post_completed');
    if (!postDone) {
        alert("Access Denied: Please complete the React Basics Final Assessment first.");
        window.location.href = "post_assessment.html";
        return;
    }
    build();
};
</script>
</body>
</html>
