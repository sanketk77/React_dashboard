<!DOCTYPE html>
<html lang="en">
<head>
    <script src="scormdriver.js"></script>
    <script src="APIWrapper.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Basics — Pre-Assessment</title>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-light: #e8f0fe;
            --primary-dark: #1557b0;
            --success: #1e8e3e;
            --success-light: #f1f8e9;
            --error: #d32f2f;
            --error-light: #ffebee;
            --bg: #f8f9fa;
            --bg-light: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --text-light: #80868b;
            --border: #dadce0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body {
            height: 100%;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .sidebar-logo {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            width: 160px;
            height: auto;
            display: block;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .sidebar-content {
            padding: 30px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .timer-section {
            background: linear-gradient(135deg, var(--primary-light) 0%, #f0f7ff 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .timer-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .timer-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            transition: color 0.3s ease;
        }

        .timer-value.warning {
            color: #f57c00;
        }

        .timer-value.critical {
            color: var(--error);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .answered-section {
            background: linear-gradient(135deg, var(--success-light) 0%, #f1f8e9 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--success);
        }

        .answered-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .answered-count {
            font-size: 24px;
            font-weight: 700;
            color: var(--success);
        }

        .sidebar-nav {
            margin-top: auto;
            padding-bottom: 20px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .sidebar-nav a:hover {
            background: var(--primary-light);
            color: var(--primary);
            transform: translateX(-4px);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
            overflow-y: auto;
            max-width: 900px;
        }

        .header {
            margin-bottom: 40px;
            animation: fadeInDown 0.5s ease;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary-light) 0%, #d2e3fc 100%);
            color: var(--primary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 4px rgba(26, 115, 232, 0.1);
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 16px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-container {
            margin-bottom: 40px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .progress-percentage {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 4px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ===== QUESTION CARD ===== */
        .qcard {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow);
            display: none;
            border: 1px solid var(--border);
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: fadeIn 0.4s ease;
        }

        .qcard.active {
            display: flex;
        }

        .qcard-header {
            margin-bottom: 32px;
        }

        .topic-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: block;
        }

        .qnum {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .qtext {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0;
            line-height: 1.5;
            letter-spacing: -0.3px;
        }

        /* ===== OPTIONS ===== */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 28px;
        }

        .opt {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-light);
            position: relative;
            overflow: hidden;
        }

        .opt::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.4s ease;
        }

        .opt:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.15);
        }

        .opt:hover::before {
            left: 100%;
        }

        .opt.selected {
            background: var(--primary-light);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        .olabel {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            background: var(--bg);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .opt.selected .olabel {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3);
        }

        .otext {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.4;
        }

        /* ===== CONTROLS ===== */
        .nav-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        button {
            padding: 12px 28px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--bg-light);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            color: var(--text-main);
        }

        button:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
            font-weight: 700;
        }

        /* ===== RESULTS ===== */
        #results {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .results-header {
            text-align: center;
            padding: 40px;
            background: var(--bg-light);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .score-big {
            font-size: 56px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin: 32px 0;
        }

        .stat-card {
            background: var(--bg-light);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .review-card {
            background: var(--bg-light);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 5px solid var(--border);
            box-shadow: var(--shadow);
        }

        .review-card.correct { border-left-color: var(--success); }
        .review-card.incorrect { border-left-color: var(--error); }

        .exp-box {
            background: rgba(0,0,0,0.03);
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-sub);
            border-left: 3px solid var(--primary);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: static; }
            .main-content { margin-left: 0; padding: 20px; }
            .nav-controls { flex-direction: column; }
            button { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="jade_logo.webp" alt="Jade Global Logo" class="logo-img">
        </div>
    </div>

    <div class="sidebar-content">
        <div class="timer-section">
            <div class="timer-label">⏱ Time Remaining</div>
            <div id="qtimer" class="timer-value">20:00</div>
        </div>

        <div class="answered-section">
            <div class="answered-label">✓ Answered</div>
            <div class="answered-count" id="ans-num">0 / 20</div>
        </div>

        <nav class="sidebar-nav">
            <a href="../index.html">← Exit to Dashboard</a>
        </nav>
    </div>
</div>

<div class="main-content">
    <div id="quiz-ui">
        <div class="header">
            <div class="badge">Module 2: React Basics</div>
            <h1>Pre-Assessment</h1>
            <p>This diagnostic helps us understand your starting point with React. Answer naturally based on what you know now.</p>
        </div>

        <div class="progress-container">
            <div class="progress-info">
                <span class="progress-label">Progress</span>
                <span class="progress-percentage" id="prog-text">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="prog" style="width: 0%"></div>
            </div>
        </div>

        <div id="questions-container"></div>

        <div class="nav-controls">
            <button id="prev-btn" onclick="nav(-1)" disabled>← Previous</button>
            <div id="submit-row" style="display:none">
                <button class="btn-submit" onclick="submitAssessment()">Check My Results →</button>
            </div>
            <button id="next-btn" onclick="nav(1)">Next →</button>
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
const QS = [
    {
        topic: "Foundations",
        q: "What is React primarily used for?",
        opts: ["Managing databases", "Building User Interfaces (UIs)", "Server-side hardware routing", "Data encryption"],
        ans: 1,
        exp: "React is a JavaScript library specifically for building user interfaces from reusable pieces called components."
    },
    {
        topic: "SPA Concept",
        q: "How does a Single Page Application (SPA) handle navigation differently than a traditional website?",
        opts: ["It reloads the whole page every click", "It uses many HTML files", "It swaps only changed components without a page reload", "It only works on mobile devices"],
        ans: 2,
        exp: "In a React SPA, the browser loads one HTML file and React swaps components instantly."
    },
    {
        topic: "JSX Syntax",
        q: "In JSX, which attribute is used instead of the standard HTML 'class'?",
        opts: ["styleClass", "classID", "className", "elementClass"],
        ans: 2,
        exp: "Because 'class' is a reserved keyword in JavaScript, React uses 'className'."
    },
    {
        topic: "Components",
        q: "What is a React Component?",
        opts: ["A global variable", "A JavaScript function that returns JSX", "A type of CSS file", "A backend server folder"],
        ans: 1,
        exp: "A component is a reusable JavaScript function that returns JSX code."
    },
    {
        topic: "Core Concepts",
        q: "How must a React Component's name always start?",
        opts: ["With a dollar sign ($)", "With a lowercase letter", "With a Capital letter", "With an underscore (_)"],
        ans: 2,
        exp: "React component names must start with a Capital letter to distinguish them from standard HTML tags."
    },
    {
        topic: "Props",
        q: "What are 'Props' used for in React?",
        opts: ["Storing data inside a component", "Passing data from a parent to a child component", "Styling the background of a page", "Connecting to a database"],
        ans: 1,
        exp: "Props act like function arguments used to pass data down the component tree."
    },
    {
        topic: "State",
        q: "Which hook is used to manage data that changes over time within a component?",
        opts: ["useEffect", "useRouter", "useState", "useData"],
        ans: 2,
        exp: "The useState hook allows you to track and update dynamic data."
    },
    {
        topic: "Interactivity",
        q: "What happens when a component's 'State' changes?",
        opts: ["The browser crashes", "The whole page reloads", "React automatically re-renders that component", "Nothing happens until you refresh"],
        ans: 2,
        exp: "React detects state changes and updates the UI automatically."
    },
    {
        topic: "Architecture",
        q: "Which direction does data typically flow in a React application?",
        opts: ["Bottom-up (Child to Parent)", "Circular", "Top-down (Parent to Child)", "Randomly"],
        ans: 2,
        exp: "React uses unidirectional (top-down) data flow for predictability."
    },
    {
        topic: "Lists",
        q: "What is the purpose of the 'key' prop when rendering lists?",
        opts: ["To set the font size", "To help React track which items changed or were removed", "To hide the list from the user", "To name the list"],
        ans: 1,
        exp: "Keys provide a unique identity to list items for efficient DOM updates."
    },
    {
        topic: "Event Handling",
        q: "What is the correct syntax for an onClick event in JSX?",
        opts: ["onclick='handleClick()'", "onClick={handleClick}", "handleClick={onClick}", "on-click={handleClick()}"],
        ans: 1,
        exp: "In JSX, event handlers are passed as camelCase functions within curly braces."
    },
    {
        topic: "Hooks (useEffect)",
        q: "When does a useEffect hook with an empty dependency array ([]) run?",
        opts: ["On every re-render", "Only once, after the initial mount", "Every time props change", "Only when the component unmounts"],
        ans: 1,
        exp: "An empty array causes the effect to run only once after the initial render."
    },
    {
        topic: "Virtual DOM",
        q: "What is the primary performance benefit of the Virtual DOM?",
        opts: ["It increases the internet speed", "It updates the entire browser page instantly", "It only updates the parts of the real DOM that actually changed", "It removes the need for JavaScript"],
        ans: 2,
        exp: "The Virtual DOM calculates the most efficient way to update the actual UI."
    },
    {
        topic: "JSX Rules",
        q: "Which of the following is a strict rule when returning JSX from a component?",
        opts: ["You must return at least 5 elements", "All tags must be lowercase", "JSX must be wrapped in a single parent element", "You cannot use variables inside JSX"],
        ans: 2,
        exp: "React components must return a single root element (Fragment or div)."
    },
    {
        topic: "Conditional Rendering",
        q: "What is the most common way to conditionally render an element in React?",
        opts: ["Using an if-else tag", "Using the ternary operator (? :) or logical AND (&&)", "Using CSS display:none only", "Using a for loop"],
        ans: 1,
        exp: "React uses standard JavaScript logic like ternary operators for UI decisions."
    },
    {
        topic: "Tooling",
        q: "Which command is standard for starting a local development server in a modern React project (Vite)?",
        opts: ["npm start", "npm build", "npm run dev", "npm serve"],
        ans: 2,
        exp: "Vite uses 'npm run dev' to launch the local development server."
    },
    {
        topic: "Fragements",
        q: "Why would you use a React Fragment (<>...</>) instead of a <div>?",
        opts: ["To make the code run faster", "To group elements without adding extra nodes to the DOM", "To add background colors", "To connect to an API"],
        ans: 1,
        exp: "Fragments let you group children without adding unnecessary wrapper divs."
    },
    {
        topic: "Hooks Rules",
        q: "Where are you allowed to call React Hooks?",
        opts: ["Inside standard JavaScript loops", "Inside any function in your project", "Only at the top level of a function component", "Inside a nested if statement"],
        ans: 2,
        exp: "Hooks must be called at the top level to ensure consistent execution order."
    },
    {
        topic: "Forms",
        q: "In a 'controlled component', how is the input value managed?",
        opts: ["By the browser's internal memory", "By the React state (useState)", "By a direct database link", "By a CSS file"],
        ans: 1,
        exp: "Controlled components link input values to React state."
    },
    {
        topic: "Ecosystem",
        q: "Who developed and currently maintains React?",
        opts: ["Google", "Microsoft", "Meta (formerly Facebook)", "Amazon"],
        ans: 2,
        exp: "React was created by Meta (formerly Facebook) and is maintained by them and the community."
    }
];

let current = 0;
let answered = {};
let submitted = false;
let timeLeft = 20 * 60;
let timerInt;

function buildQuestions() {
    const c = document.getElementById('questions-container');
    QS.forEach((q, i) => {
        const d = document.createElement('div');
        d.className = 'qcard' + (i === 0 ? ' active' : '');
        d.id = 'q' + i;
        d.innerHTML = `
            <div class="qcard-header">
                <div class="topic-label">📌 ${q.topic}</div>
                <div class="qnum">Question ${i+1} of ${QS.length}</div>
                <div class="qtext">${q.q}</div>
            </div>
            <div class="options" id="opts${i}">
                ${q.opts.map((o, j) => `
                    <div class="opt" id="opt${i}_${j}" onclick="selectOpt(${i},${j})">
                        <div class="olabel">${String.fromCharCode(65+j)}</div>
                        <div class="otext">${o}</div>
                    </div>`).join('')}
            </div>`;
        c.appendChild(d);
    });
}

function selectOpt(qi, oi) {
    if (submitted) return;
    answered[qi] = oi;
    document.querySelectorAll(`#opts${qi} .opt`).forEach((el, j) => el.classList.toggle('selected', j === oi));
    
    const count = Object.keys(answered).length;
    document.getElementById('ans-num').textContent = `${count} / ${QS.length}`;
    
    const progPct = Math.round((count / QS.length) * 100);
    document.getElementById('prog').style.width = progPct + '%';
    document.getElementById('prog-text').textContent = progPct + '%';
    
    if (count >= 15) document.getElementById('submit-row').style.display = 'block';
}

function nav(dir) {
    document.getElementById('q' + current).classList.remove('active');
    current = Math.max(0, Math.min(QS.length - 1, current + dir));
    document.getElementById('q' + current).classList.add('active');
    document.getElementById('prev-btn').disabled = (current === 0);
    document.getElementById('next-btn').disabled = (current === QS.length - 1);
}

function submitAssessment() {
    if(submitted) return;
    submitted = true;
    clearInterval(timerInt);
    localStorage.setItem('react_pre_completed', 'true');
    showResults();
}

function showResults() {
    document.getElementById('quiz-ui').style.display = 'none';
    const r = document.getElementById('results');
    r.style.display = 'block';
    
    let correct = 0;
    QS.forEach((q, i) => { if (answered[i] === q.ans) correct++; });
    const pct = Math.round((correct / QS.length) * 100);
    const timeSpent = (20 * 60) - timeLeft;
    const m = Math.floor(timeSpent / 60), s = timeSpent % 60;

    r.innerHTML = `
        <div class="results-header">
            <h2 style="font-size:28px; font-weight:700; margin-bottom:20px;">🎉 Assessment Complete</h2>
            <div class="score-big">${pct}%</div>
            <p style="color:var(--text-sub);">Diagnostic complete. Learning content is now unlocked.</p>
        </div>
        <div class="result-grid">
            <div class="stat-card"><div style="font-size:28px; font-weight:700; color:var(--primary);">${correct}</div><div style="font-size:12px; font-weight:600; color:var(--text-light);">Correct</div></div>
            <div class="stat-card"><div style="font-size:28px; font-weight:700; color:var(--error);">${QS.length - correct}</div><div style="font-size:12px; font-weight:600; color:var(--text-light);">Incorrect</div></div>
            <div class="stat-card"><div style="font-size:28px; font-weight:700; color:var(--primary);">${m}:${s < 10 ? '0' : ''}${s}</div><div style="font-size:12px; font-weight:600; color:var(--text-light);">Time Taken</div></div>
        </div>
        <div style="display:flex; justify-content:center; margin-bottom:40px;">
            <button class="btn-submit" onclick="window.location.href='content.html'" style="padding:14px 32px;">📚 Go to Learning Content →</button>
        </div>
        <div style="margin-top:40px;">
            <h3 style="font-size:20px; font-weight:700; padding-bottom:16px; border-bottom:2px solid var(--border); margin-bottom:20px;">📋 Review Your Answers</h3>
            ${QS.map((q, i) => {
                const ua = answered[i];
                const ok = ua === q.ans;
                return `
                <div class="review-card ${ok ? 'correct' : 'incorrect'}">
                    <div style="font-weight:600; margin-bottom:12px;">Question ${i + 1}: ${q.q}</div>
                    <div style="font-size:14px;">Your Answer: <strong>${ua !== undefined ? q.opts[ua] : 'None'}</strong></div>
                    ${!ok ? `<div style="font-size:14px; color:var(--success); font-weight:600;">✓ Correct: ${q.opts[q.ans]}</div>` : ''}
                    <div class="exp-box">💡 ${q.exp}</div>
                </div>`;
            }).join('')}
        </div>
    `;
}

function startTimer() {
    timerInt = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        const display = document.getElementById('qtimer');
        display.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        
        if (timeLeft <= 60) display.classList.add('warning');
        if (timeLeft <= 30) { display.classList.remove('warning'); display.classList.add('critical'); }
        
        if (timeLeft <= 0) { clearInterval(timerInt); submitAssessment(); }
    }, 1000);
}

window.onload = function() { buildQuestions(); startTimer(); }
</script>
</body>
</html>
