<!DOCTYPE html>
<html lang="en">
<head>
   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Intermediate — Post-Assessment</title>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-light: #e8f0fe;
            --primary-dark: #1557b0;
            --success: #1e8e3e;
            --success-light: #f1f8e9;
            --error: #d32f2f;
            --error-light: #ffebee;
            --bg: #f8f9fa;
            --bg-light: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --text-light: #80868b;
            --border: #dadce0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --code-bg: #282c34;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body {
            height: 100%;
            scroll-behavior: smooth;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .sidebar-logo {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            width: 160px;
            height: auto;
            display: block;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .sidebar-content {
            padding: 30px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .timer-section {
            background: linear-gradient(135deg, var(--primary-light) 0%, #f0f7ff 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .timer-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .timer-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            transition: color 0.3s ease;
        }

        .timer-value.warning { color: #f57c00; }
        .timer-value.critical { color: var(--error); animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .answered-section {
            background: linear-gradient(135deg, var(--success-light) 0%, #f1f8e9 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--success);
        }

        .answered-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .answered-count {
            font-size: 24px;
            font-weight: 700;
            color: var(--success);
        }

        .sidebar-nav {
            margin-top: auto;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .sidebar-nav a:hover {
            background: var(--primary-light);
            color: var(--primary);
            transform: translateX(-4px);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
            overflow-y: auto;
            max-width: 900px;
        }

        .header {
            margin-bottom: 40px;
            animation: fadeInDown 0.5s ease;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary-light) 0%, #d2e3fc 100%);
            color: var(--primary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 4px rgba(26, 115, 232, 0.1);
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 16px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        /* ===== PROGRESS BAR ===== */
        /* Updated to stick to the top when scrolling */
        .progress-container {
            margin-bottom: 40px;
            position: sticky;
            top: 0;
            background: rgba(248, 249, 250, 0.95);
            padding: 10px 0 20px 0;
            z-index: 10;
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .progress-percentage {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 4px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ===== QUESTION CARDS (Scrolling Layout) ===== */
        .qcard {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            margin-bottom: 40px; /* Spacing between cards */
            animation: fadeIn 0.4s ease;
        }

        .qcard-header {
            margin-bottom: 32px;
        }

        .topic-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: block;
        }

        .qnum {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .qtext {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0;
            line-height: 1.5;
            letter-spacing: -0.3px;
        }

        /* ===== OPTIONS ===== */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .opt {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-light);
            position: relative;
            overflow: hidden;
        }

        .opt::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.4s ease;
        }

        .opt:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.15);
        }

        .opt:hover::before { left: 100%; }

        .opt.selected {
            background: var(--primary-light);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        .olabel {
            width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center; font-size: 14px;
            font-weight: 700; color: var(--text-main); background: var(--bg); flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .opt.selected .olabel {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3);
        }

        .otext { font-size: 15px; font-weight: 500; color: var(--text-main); line-height: 1.4; }

        /* ===== SUBMIT CONTROLS ===== */
        .submit-container {
            display: none; /* Hidden until finished */
            text-align: center;
            margin-top: 40px;
            margin-bottom: 60px;
            padding-top: 30px;
            border-top: 2px dashed var(--border);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
            font-weight: 700;
            padding: 16px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            box-shadow: 0 6px 16px rgba(26, 115, 232, 0.4);
            transform: translateY(-2px);
        }

        /* ===== RESULTS ===== */
        #results { display: none; animation: fadeIn 0.5s ease; }
        .results-header { text-align: center; padding: 40px; background: var(--bg-light); border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 32px; }
        .results-header h2 { font-size: 28px; font-weight: 700; margin-bottom: 20px; color: var(--text-main); }
        .score-big { font-size: 56px; font-weight: 700; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
        .results-subtitle { font-size: 16px; color: var(--text-sub); line-height: 1.6; }
        
        .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin: 32px 0; }
        .stat-card { background: var(--bg-light); padding: 24px; border-radius: 12px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        .stat-label { font-size: 12px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }

        .action-buttons { display: flex; justify-content: center; gap: 16px; margin: 40px 0; flex-wrap: wrap; }
        .action-buttons .btn-submit { padding: 14px 32px; font-size: 15px; }

        .review-section { margin-top: 40px; }
        .review-section h3 { font-size: 20px; font-weight: 700; color: var(--text-main); margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid var(--border); }
        .review-card { background: var(--bg-light); border-radius: 12px; padding: 24px; margin-bottom: 16px; border-left: 5px solid var(--border); box-shadow: var(--shadow); }
        .review-card.correct { border-left-color: var(--success); background: linear-gradient(135deg, var(--bg-light) 0%, var(--success-light) 100%); }
        .review-card.incorrect { border-left-color: var(--error); background: linear-gradient(135deg, var(--bg-light) 0%, var(--error-light) 100%); }
        .review-qtext { font-weight: 600; font-size: 15px; margin-bottom: 12px; color: var(--text-main); }
        .review-item { font-size: 14px; margin-bottom: 8px; color: var(--text-main); }
        .review-item.correct { color: var(--success); font-weight: 600; }
        .review-item.incorrect { color: var(--error); }
        
        .exp-box { background: rgba(255,255,255,0.6); padding: 12px 16px; border-radius: 8px; margin-top: 12px; font-size: 13px; color: var(--text-sub); border-left: 3px solid var(--primary); line-height: 1.5; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .sidebar { width: 260px; }
            .main-content { margin-left: 260px; padding: 30px; }
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); }
            .sidebar-content { flex-direction: row; gap: 20px; }
            .main-content { margin-left: 0; padding: 20px; max-width: 100%; }
            .progress-container { top: 0; padding-top: 10px; }
            .action-buttons { flex-direction: column; }
            .action-buttons .btn-submit { width: 100%; }
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-light); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="jade_logo.webp" alt="Jade Global Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div style="display:none; font-weight: 800; color: var(--primary); font-size: 1.2rem; letter-spacing: -0.5px;">JADE GLOBAL</div>
        </div>
    </div>

    <div class="sidebar-content">
        <div class="timer-section">
            <div class="timer-label">⏱ Time Remaining</div>
            <div id="qtimer" class="timer-value">20:00</div>
        </div>

        <div class="answered-section">
            <div class="answered-label">✓ Answered</div>
            <div class="answered-count" id="ans-num">0 / 20</div>
        </div>

        <nav class="sidebar-nav" style="margin-top: auto;">
            <a href="../index.html">← Exit Assessment</a>
        </nav>
    </div>
</div>

<div class="main-content">
    <div id="quiz-ui">
        <div class="header">
            <div class="badge">📝 Module 1: Fundamentals</div>
            <h1>React Intermediate Post-Assessment</h1>
            <p>Scroll down to answer all questions. Validate your mastery of React concepts and best practices.</p>
        </div>

        <div class="progress-container">
            <div class="progress-info">
                <span class="progress-label">Completion Progress</span>
                <span class="progress-percentage" id="prog-text">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="prog" style="width: 0%"></div>
            </div>
        </div>

        <div id="questions-container"></div>

        <div class="submit-container" id="submit-row">
            <h3 style="margin-bottom: 15px; color: var(--text-main);">You have answered all questions!</h3>
            <button class="btn-submit" onclick="submitAssessment()">Submit for Grading →</button>
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
const QS = [
    {
        topic: "React Hooks",
        q: "Why might `console.log(state)` immediately after calling `setState(newValue)` print the old value instead of the new one?",
        opts: [
            "setState is broken in functional components",
            "State updates are asynchronous and batched for performance",
            "React creates a new component instance immediately",
            "The state variable is immutable and cannot be logged"
        ],
        ans: 1,
        exp: "State updates in React are asynchronous. The new state value is only available in the next render cycle."
    },
    {
        topic: "React Hooks",
        q: "What happens if you completely omit the dependency array in a `useEffect` hook?",
        opts: [
            "The effect runs only once on mount",
            "The effect never runs",
            "The effect runs after every single render",
            "React throws a compilation error"
        ],
        ans: 2,
        exp: "Omitting the dependency array causes the effect to fire after every render, which can lead to infinite loops if state is updated inside it."
    },
    {
        topic: "React Hooks",
        q: "How do you perform cleanup (like removing event listeners) in a `useEffect` hook?",
        opts: [
            "Call a cleanup() function inside the effect",
            "Return a function from the effect",
            "Pass a second function as the third argument to useEffect",
            "Use the useCleanup() hook"
        ],
        ans: 1,
        exp: "Returning a function from a useEffect tells React to run that function before the component unmounts or before the effect re-runs."
    },
    {
        topic: "Props & State",
        q: "What does the concept of 'Lifting State Up' mean in React?",
        opts: [
            "Moving state to a global Redux store",
            "Moving state to the closest common ancestor of components that need it",
            "Using a Custom Hook to manage state",
            "Converting props into state variables"
        ],
        ans: 1,
        exp: "When multiple components need to share the same changing data, it is recommended to lift the shared state up to their closest common ancestor parent."
    },
    {
        topic: "Props & State",
        q: "Why should you never mutate state directly (e.g., `state.count = 1`)?",
        opts: [
            "It will cause an infinite loop",
            "React relies on object identity comparison and won't trigger a re-render",
            "It deletes the Virtual DOM",
            "It throws a strict mode JavaScript syntax error"
        ],
        ans: 1,
        exp: "React detects changes by comparing object references. Mutating state directly bypasses this, meaning the UI won't update to reflect the change."
    },
    {
        topic: "Props & State",
        q: "How can a child component communicate data back up to its parent?",
        opts: [
            "By using the useParent() hook",
            "By directly modifying the parent's state object",
            "By calling a callback function passed down as a prop from the parent",
            "By using the &lt;Emit /&gt; component"
        ],
        ans: 2,
        exp: "Data flows down via props, but parents can pass functions to children. The child calls this function to send data or events back up."
    },
    {
        topic: "React Router",
        q: "Which hook is used in React Router v6 to programmatically navigate a user (e.g., after a form submission)?",
        opts: [
            "useHistory()",
            "useRoute()",
            "useNavigate()",
            "useRedirect()"
        ],
        ans: 2,
        exp: "In React Router v6, useNavigate() replaced the older useHistory() hook for programmatic navigation."
    },
    {
        topic: "React Router",
        q: "How do you extract dynamic URL parameters (like extracting '123' from `/users/123`) using React Router?",
        opts: [
            "useParams()",
            "useRouteMatch()",
            "useSearch()",
            "useLocation()"
        ],
        ans: 0,
        exp: "The useParams() hook returns an object of key/value pairs of the dynamic params parsed from the current URL."
    },
    {
        topic: "React Router",
        q: "What is the purpose of the `&lt;Outlet /&gt;` component in React Router v6?",
        opts: [
            "To render an external website inside an iframe",
            "To define the fallback 404 Not Found page",
            "To render child route elements within a parent layout component",
            "To pass global state to multiple routes"
        ],
        ans: 2,
        exp: "An &lt;Outlet /&gt; should be used in parent route elements to render their child route elements, allowing for nested UI layouts."
    },
    {
        topic: "API Integration",
        q: "What is the standard hook used to trigger an API fetch when a functional component first mounts?",
        opts: [
            "useFetch",
            "useMount",
            "useState",
            "useEffect"
        ],
        ans: 3,
        exp: "useEffect with an empty dependency array [] is the standard place to trigger initial data fetching when a component mounts."
    },
    {
        topic: "API Integration",
        q: "When fetching data, why is it important to implement an AbortController or a cleanup boolean?",
        opts: [
            "To prevent memory leaks if the component unmounts before the fetch finishes",
            "To clear the browser's cache",
            "To make the API call execute faster",
            "To bypass CORS errors from the server"
        ],
        ans: 0,
        exp: "If a user navigates away before a fetch completes, attempting to update state on the now-unmounted component causes memory leaks."
    },
    {
        topic: "API Integration",
        q: "What primary problem do modern libraries like React Query or SWR solve?",
        opts: [
            "Routing between pages",
            "Managing complex CSS styles",
            "Handling server state, automated caching, and data synchronization",
            "Compiling JSX into standard JavaScript"
        ],
        ans: 2,
        exp: "These libraries specialize in 'server state' by caching responses, deduplicating requests, and keeping data fresh in the background."
    },
    {
        topic: "Performance Optimization",
        q: "What is the primary purpose of the `useMemo` hook?",
        opts: [
            "To memoize a function definition so it isn't recreated",
            "To cache the result of an expensive calculation between renders",
            "To remember the previous state value of an input",
            "To store data persistently in LocalStorage"
        ],
        ans: 1,
        exp: "useMemo caches the computed value of a function, only recomputing it when its dependencies change, saving processing power."
    },
    {
        topic: "Performance Optimization",
        q: "How does `useCallback` differ from `useMemo`?",
        opts: [
            "useCallback returns a memoized function instance, while useMemo returns a memoized value",
            "useCallback is for APIs, useMemo is for mathematics",
            "There is no difference, they are aliases",
            "useCallback triggers re-renders, useMemo prevents them"
        ],
        ans: 0,
        exp: "useCallback(fn, deps) caches the function instance itself, while useMemo(() => fn(), deps) caches the result of the function."
    },
    {
        topic: "Performance Optimization",
        q: "When is the most appropriate time to wrap a component in `React.memo`?",
        opts: [
            "Always, for every single component in the app",
            "When a component renders often with the exact same props",
            "When a component needs to access the Context API",
            "When a component contains heavy CSS animations"
        ],
        ans: 1,
        exp: "React.memo skips rendering if the props haven't changed. Overusing it on simple components can hurt performance due to the cost of prop comparison."
    },
    {
        topic: "Performance Optimization",
        q: "Why is using an array `index` as a `key` prop in a mapped list discouraged?",
        opts: [
            "It causes strict mode syntax errors",
            "It makes the code harder for other developers to read",
            "It can cause rendering bugs and performance issues if the list order changes",
            "React ignores index keys entirely and generates its own"
        ],
        ans: 2,
        exp: "If items are added, removed, or reordered, using the index as a key confuses React's reconciliation process, leading to incorrect DOM updates."
    },
    {
        topic: "Context API",
        q: "Which two parts are fundamentally required to implement the Context API?",
        opts: [
            "Router and Switch",
            "Provider and Consumer (or useContext)",
            "State and Props",
            "Sender and Receiver"
        ],
        ans: 1,
        exp: "You need a Provider component to supply the context value to the tree, and a Consumer (typically the useContext hook) to read it."
    },
    {

        q: "What is a common performance pitfall of using the Context API for everything?",
        opts: [
            "It slows down the initial page load time",
            "It triggers a re-render of all consuming components whenever the context value changes",
            "It uses too much of the browser's memory",
            "It automatically blocks asynchronous API calls"

        ans: 1,
        exp: "Every component using useContext() will re-render when the Provider's value changes, even if they only need a small, unrelated piece of that data."

let answered = {};
let submitted = false;
let timeLeft = 20 * 60;
let timerInt;

window.onload = function() {
    // This checks for the Pre-Assessment (Assuming you have this page built)
    const preDone = localStorage.getItem('react_int_pre_completed');
    
    // This checks for the Content Page we just linked
    const contentDone = localStorage.getItem('react_int_content_completed'); 
    
    if (!preDone) {
        alert("🔒 Access Denied: You must complete the Intermediate Pre-Assessment first.");
        window.location.href = "int_pre_assessment.html";
        return;
    }
    
    // If they haven't completed the content, send them back to int_content.html
    if (!contentDone) {
        alert("🔒 Access Denied: Please review the Intermediate Learning Materials before taking this Final Assessment.");
        window.location.href ="content.html"; 
        return;
    }
    
    buildQuestions();
    startTimer();
};

function buildQuestions() {
    const c = document.getElementById('questions-container');
    QS.forEach((q, i) => {
        const d = document.createElement('div');
        // Notice we do not use 'active' class here. All cards are visible.
        d.className = 'qcard'; 
        d.id = 'q' + i;
        d.innerHTML = `
            <div class="qcard-header">
                <div class="topic-label">📌 ${q.topic}</div>
                <div class="qnum">Question ${i+1} of ${QS.length}</div>
                <div class="qtext">${q.q}</div>
            </div>
            <div class="qcard-content">
                <div class="options" id="opts${i}">
                    ${q.opts.map((o, j) => `
                        <div class="opt" id="opt${i}_${j}" onclick="selectOpt(${i},${j})">
                            <div class="olabel">${String.fromCharCode(65+j)}</div>
                            <div class="otext">${o}</div>
                        </div>`).join('')}
                </div>
            </div>`;
        c.appendChild(d);
    });
}

function selectOpt(qi, oi) {
    if (submitted) return;
    answered[qi] = oi;
    
    // Toggle selected class
    document.querySelectorAll(`#opts${qi} .opt`).forEach((el, j) => el.classList.toggle('selected', j === oi));
    
    // Update Stats
    const answeredCount = Object.keys(answered).length;
    document.getElementById('ans-num').textContent = `${answeredCount} / ${QS.length}`;
    
    const progPct = Math.round((answeredCount / QS.length) * 100);
    document.getElementById('prog').style.width = progPct + '%';
    document.getElementById('prog-text').textContent = progPct + '%';
    
    // Show submit button ONLY when all questions are answered
    if (answeredCount === QS.length) {
        document.getElementById('submit-row').style.display = 'block';
    }
}

function submitAssessment() {
    if(submitted) return;
    submitted = true;
    clearInterval(timerInt);
    
    // Log completion
    localStorage.setItem('react_int_post_completed', 'true');
    
    // Scroll to top to see results
    window.scrollTo(0, 0);
    showResults();
}

function showResults() {
    document.getElementById('quiz-ui').style.display = 'none';
    const r = document.getElementById('results');
    r.style.display = 'block';
    
    let correct = 0;
    QS.forEach((q, i) => { if (answered[i] === q.ans) correct++; });
    const pct = Math.round((correct / QS.length) * 100);

    const timeSpentSec = (20 * 60) - timeLeft;
    const m = Math.floor(timeSpentSec / 60), s = timeSpentSec % 60;
    const timeStr = `${m}:${s < 10 ? '0' : ''}${s}`;

    r.innerHTML = `
        <div class="results-header">
            <h2>🎉 Post-Assessment Complete</h2>
            <div class="score-big">${pct}%</div>
            <p class="results-subtitle">${pct >= 70 ? 'Great work! The Practical Assignment is now unlocked.' : 'Review your knowledge below to prepare for the assignment.'}</p>
        </div>

        <div class="result-grid">
            <div class="stat-card">
                <div class="stat-value">${correct}</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color:var(--error)">${QS.length - correct}</div>
                <div class="stat-label">Incorrect</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${timeStr}</div>
                <div class="stat-label">Time Taken</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-submit" onclick="window.location.href='index.html'" style="background: var(--bg-light); color: var(--primary); border: 2px solid var(--primary); box-shadow: none;">← Return to Dashboard</button>
            <button class="btn-submit" onclick="window.location.href='int_assignment.html'">💻 Proceed to Assignment →</button>
        </div>

        <div class="review-section">
            <h3>📋 Review Your Answers</h3>
            ${QS.map((q, i) => {
                const ua = answered[i];
                const ok = ua === q.ans;
                return `
                <div class="review-card ${ok ? 'correct' : 'incorrect'}">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                        <span style="font-size: 18px;">${ok ? '✓' : '✗'}</span>
                        <div class="review-qtext">Question ${i + 1}</div>
                    </div>
                    <div style="font-weight: 600; margin-bottom: 12px; color: var(--text-main);">${q.q}</div>
                    <div class="review-item">Your Answer: <strong>${ua !== undefined ? q.opts[ua] : 'Not answered'}</strong></div>
                    ${!ok ? `<div class="review-item correct">✓ Correct: ${q.opts[q.ans]}</div>` : ''}
                    <div class="exp-box">💡 <strong>Explanation:</strong> ${q.exp}</div>
                </div>`;
            }).join('')}
        </div>
    `;
}

function startTimer() {
    timerInt = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        const timerDisplay = document.getElementById('qtimer');
        timerDisplay.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        
        if (timeLeft <= 60) {
            timerDisplay.classList.add('warning');
        }
        if (timeLeft <= 30) {
            timerDisplay.classList.remove('warning');
            timerDisplay.classList.add('critical');
        }
        
        if (timeLeft <= 0) {
            clearInterval(timerInt);
            alert("⏱ Time is up! Submitting your answers...");
            submitAssessment();
        }
    }, 1000);
}
</script>
</body>
</html>
