<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../scormdriver.js"></script>
    <script src="../APIWrapper.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Intermediate — Practical Assignment</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>

    <style>
        :root {
            --primary: #1a73e8;
            --primary-light: #e8f0fe;
            --primary-dark: #1557b0;
            --success: #1e8e3e;
            --success-light: #f1f8e9;
            --warning: #f57c00;
            --error: #d32f2f;
            --error-light: #ffebee;
            --bg: #f8f9fa;
            --bg-light: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --text-light: #80868b;
            --border: #dadce0;
            --code-bg: #282c34;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* ===== LOCK OVERLAY ===== */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .lock-card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: var(--shadow-lg); max-width: 450px; border: 1px solid var(--border);
        }

        .lock-icon { font-size: 64px; margin-bottom: 20px; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px 20px; display: flex; justify-content: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .logo-img { width: 160px; height: auto; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1)); }

        .sidebar-content { padding: 30px 20px; flex: 1; display: flex; flex-direction: column; gap: 30px; }

        .progress-section {
            background: linear-gradient(135deg, var(--primary-light) 0%, #f0f7ff 100%);
            padding: 20px; border-radius: 12px; border-left: 4px solid var(--primary);
        }

        .progress-label {
            font-size: 11px; font-weight: 700; color: var(--text-light);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
        }

        .progress-value { font-size: 24px; font-weight: 700; color: var(--primary); }

        .progress-bar-small {
            width: 100%; height: 6px; background: var(--border);
            border-radius: 3px; margin-top: 12px; overflow: hidden;
        }
        .progress-fill-small {
            height: 100%; background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: width 0.4s ease;
        }

        .sidebar-nav { margin-top: auto; padding-bottom: 20px; }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 8px; padding: 12px 16px;
            text-decoration: none; color: var(--text-main); border-radius: 8px;
            transition: all 0.3s ease; font-size: 14px; font-weight: 500;
        }
        .sidebar-nav a:hover { background: var(--primary-light); color: var(--primary); transform: translateX(-4px); }

        /* ===== MAIN CONTENT ===== */
        .main-content { flex: 1; margin-left: 280px; padding: 40px; max-width: 1100px; }

        .header { margin-bottom: 40px; animation: fadeInDown 0.5s ease; }
        .badge {
            display: inline-block; font-size: 11px; font-weight: 700; padding: 6px 14px;
            border-radius: 20px; background: linear-gradient(135deg, var(--primary-light) 0%, #d2e3fc 100%);
            color: var(--primary); margin-bottom: 16px; text-transform: uppercase;
            letter-spacing: 0.5px; box-shadow: 0 2px 4px rgba(26, 115, 232, 0.1);
        }

        h1 { font-size: 32px; font-weight: 700; color: var(--text-main); margin-bottom: 12px; letter-spacing: -0.5px; }
        .subtitle { font-size: 16px; color: var(--text-sub); line-height: 1.6; }

        /* ===== ASSIGNMENT CARD ===== */
        .challenge-card {
            background: var(--bg-light); border-radius: 16px; padding: 32px;
            box-shadow: var(--shadow); display: none; border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }
        .challenge-card.active { display: block; }

        .task-topic {
            display: inline-block; font-size: 11px; font-weight: 700; padding: 6px 14px;
            border-radius: 6px; background: var(--primary-light); color: var(--primary);
            margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .instruction-box {
            font-size: 16px; line-height: 1.6; color: var(--text-main);
            margin-bottom: 24px; padding: 20px; background: #f8f9fa;
            border-radius: 12px; border-left: 4px solid var(--primary);
        }

        /* ===== EDITOR SECTION ===== */
        .editor-section { margin-bottom: 24px; }
        .editor-label {
            display: block; font-size: 13px; font-weight: 700; color: var(--text-main);
            margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        
        .editor-wrapper {
            border: 2px solid var(--border); border-radius: 12px; overflow: hidden;
            box-shadow: var(--shadow); background: var(--code-bg);
        }
        
        .CodeMirror {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Courier New', monospace !important;
            font-size: 14px !important; height: 300px !important; background: var(--code-bg) !important;
        }

        /* ===== STATUS & ERRORS ===== */
        .editor-status {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-radius: 8px; margin-top: 12px; font-size: 13px; font-weight: 600; display: none;
        }
        .editor-status.show { display: flex; }
        .editor-status.warning { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); color: var(--warning); border-left: 4px solid var(--warning); }
        .editor-status.error { background: linear-gradient(135deg, var(--error-light) 0%, #ffcdd2 100%); color: var(--error); border-left: 4px solid var(--error); }
        .editor-status.success { background: linear-gradient(135deg, var(--success-light) 0%, #c8e6c9 100%); color: var(--success); border-left: 4px solid var(--success); }

        /* ===== SOLUTION BOX ===== */
        .solution-box {
            display: none; background: linear-gradient(135deg, var(--success-light) 0%, #f1f8e9 100%);
            padding: 24px; border-radius: 12px; border-left: 5px solid var(--success);
            box-shadow: var(--shadow); margin-top: 24px;
        }
        .solution-box.show { display: block; animation: slideDown 0.4s ease; }
        
        .solution-title { font-size: 14px; font-weight: 700; color: var(--success); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
        .solution-code {
            background: var(--code-bg); padding: 16px; border-radius: 8px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Courier New', monospace;
            font-size: 13px; color: #abb2bf; line-height: 1.6; overflow-x: auto;
        }
        .solution-explanation { margin-top: 16px; font-size: 13px; color: #0d652d; line-height: 1.6; }

        /* ===== CONTROLS ===== */
        .controls {
            display: flex; align-items: center; justify-content: space-between; gap: 16px;
            margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); flex-wrap: wrap;
        }
        button {
            padding: 12px 28px; border-radius: 8px; border: 2px solid var(--border);
            background: var(--bg-light); cursor: pointer; font-weight: 600; font-size: 14px;
            transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; min-height: 44px;
        }
        button:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-light); transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; border: none; font-weight: 700; }
        .btn-success { background: linear-gradient(135deg, var(--success) 0%, #2e7d32 100%); color: white; border: none; font-weight: 700; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: static; }
            .main-content { margin-left: 0; padding: 20px; }
            .controls { flex-direction: column; }
            button { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-card">
        <div class="lock-icon">🔒</div>
        <h2 style="margin-bottom: 12px;">Assignment Locked</h2>
        <p style="color: var(--text-sub); margin-bottom: 24px; line-height: 1.5;">Please complete the <b>Intermediate Post-Assessment</b> before attempting this Practical Assignment.</p>
        <button class="btn-primary" onclick="window.location.href='int_post_assessment.html'" style="margin: 0 auto;">Take Post-Assessment</button>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="jade_logo.webp" alt="Jade Global Logo" class="logo-img">
        </div>
    </div>

    <div class="sidebar-content">
        <div class="progress-section">
            <div class="progress-label">📝 Task Progress</div>
            <div class="progress-value" id="progress-text">1 / 10</div>
            <div class="progress-bar-small">
                <div class="progress-fill-small" id="progress-fill" style="width: 10%"></div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="../index.html">← Exit Assignment</a>
        </nav>
    </div>
</div>

<div class="main-content">
    <div id="quiz-ui">
        <div class="header">
            <div class="badge">💻 Intermediate Practical</div>
            <h1>Advanced Global Dashboard</h1>
            <p class="subtitle">Solve each challenge to build a robust state management and optimization layer.</p>
        </div>

        <div id="assignment-container"></div>

        <div class="controls">
            <button id="prev-btn" onclick="move(-1)" disabled>← Previous</button>
            <button id="submit-code-btn" class="btn-success" onclick="submitCode()">Submit & Review →</button>
            <button id="next-btn" class="btn-primary" onclick="move(1)" style="display:none;">Next Task →</button>
        </div>
    </div>
</div>

<script>
    // GATEKEEPER
    window.onload = function() {
        const postDone = localStorage.getItem('react_int_post_completed');
        if (!postDone) {
            document.getElementById('lock-screen').style.display = 'flex';
            document.getElementById('quiz-ui').style.opacity = '0.2';
            document.getElementById('quiz-ui').style.pointerEvents = 'none';
            return;
        }
        buildTasks();
        initializeEditors();
    };

    const tasks = [
        {
            topic: "Global Context Setup",
            instruction: "Create a 'ThemeContext' using React's Context API. Provide a default value of 'light'.",
            solution: "import { createContext } from 'react';\n\nexport const ThemeContext = createContext('light');",
            explanation: "Context API is essential for avoiding 'prop drilling' in larger applications.",
            hint: "Use createContext from 'react'"
        },
        {
            topic: "Context Provider Wrapper",
            instruction: "Create a 'ThemeProvider' component that manages a 'theme' state and passes both the theme and its setter function through the Provider.",
            solution: "export const ThemeProvider = ({ children }) => {\n  const [theme, setTheme] = useState('light');\n  return (\n    <ThemeContext.Provider value={{ theme, setTheme }}>\n      {children}\n    </ThemeContext.Provider>\n  );\n};",
            explanation: "Wrappers allow components to share state globally across the entire app.",
            hint: "Wrap {children} with ThemeContext.Provider"
        },
        {
            topic: "Consuming Global State",
            instruction: "In a component named 'Header', use the 'useContext' hook to access the current theme and display it.",
            solution: "const { theme } = useContext(ThemeContext);\nreturn <h1>Current Theme: {theme}</h1>;",
            explanation: "Hooks provide a clean way to access global state in functional components without manual plumbing.",
            hint: "Destructure { theme } from useContext(ThemeContext)"
        },
        {
            topic: "Custom Hook: useFetch",
            instruction: "Create a custom hook named 'useFetch' that takes a URL and returns { data, loading }. Use it to fetch and manage server state.",
            solution: "export const useFetch = (url) => {\n  const [data, setData] = useState(null);\n  const [loading, setLoading] = useState(true);\n  useEffect(() => {\n    fetch(url).then(res => res.json()).then(json => {\n      setData(json); setLoading(false);\n    });\n  }, [url]);\n  return { data, loading };\n};",
            explanation: "Custom hooks extract reusable stateful logic into modular functions.",
            hint: "Combine useState and useEffect inside a function starting with 'use'"
        },
        {
            topic: "useReducer Implementation",
            instruction: "Initialize a reducer for a Shopping Cart. Handle an 'ADD_ITEM' action that appends a new product to the cart array.",
            solution: "function cartReducer(state, action) {\n  switch (action.type) {\n    case 'ADD_ITEM':\n      return { ...state, items: [...state, action.payload] };\n    default: return state;\n  }\n}",
            explanation: "useReducer is preferred for complex state logic involving multiple sub-values or next-state dependencies.",
            hint: "Use a switch statement on action.type"
        },
        {
            topic: "Memoizing Expensive Data",
            instruction: "Use 'useMemo' to filter a large list of 'users' based on a 'searchQuery' so it only re-calculates when either value changes.",
            solution: "const filteredUsers = useMemo(() => {\n  return users.filter(u => u.name.includes(searchQuery));\n}, [users, searchQuery]);",
            explanation: "Memoization prevents unnecessary re-calculations during component re-renders, protecting performance.",
            hint: "Provide an array of dependencies [users, searchQuery]"
        },
        {
            topic: "Function Stability with useCallback",
            instruction: "Wrap a 'handleSubmit' function in 'useCallback' to ensure its reference stays stable between renders.",
            solution: "const handleSubmit = useCallback(() => {\n  console.log('Submitted');\n}, []);",
            explanation: "useCallback maintains referential identity for functions, vital when passing them to memoized children.",
            hint: "Use useCallback(fn, [])"
        },
        {
            topic: "Accessing DOM with useRef",
            instruction: "Create a ref and attach it to a video element so you can play/pause it programmatically using a button click.",
            solution: "const videoRef = useRef(null);\nconst playVideo = () => videoRef.current.play();\nreturn <video ref={videoRef} />;",
            explanation: "useRef provides a persistent way to interact with real DOM nodes directly without triggering re-renders.",
            hint: "Access the DOM node via ref.current"
        },
        {
            topic: "Error Boundaries",
            instruction: "Explain how to implement a basic Error Boundary using the 'componentDidCatch' lifecycle method.",
            solution: "class MyBoundary extends React.Component {\n  componentDidCatch(error, info) {\n    // Log to error reporting service\n  }\n  render() { return this.props.children; }\n}",
            explanation: "Error boundaries catch JavaScript errors anywhere in the child component tree to prevent whole-app crashes.",
            hint: "Create a class component with componentDidCatch"
        },
        {
            topic: "SSR Concepts (Next.js)",
            instruction: "Write a mock 'getServerSideProps' function that fetches data for a page before it is sent to the client.",
            solution: "export async function getServerSideProps() {\n  const res = await fetch('https://api.data.com');\n  const data = await res.json();\n  return { props: { data } };\n}",
            explanation: "Server-side rendering (SSR) fetches data on the server to improve SEO and perceived load time.",
            hint: "Return an object with a 'props' key"
        }
    ];

    let current = 0;
    let editors = {};

    function buildTasks() {
        const container = document.getElementById('assignment-container');
        tasks.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `challenge-card ${i === 0 ? 'active' : ''}`;
            div.id = `task-${i}`;
            div.innerHTML = `
                <div class="task-topic">📌 ${t.topic}</div>
                
                <div class="instruction-box">
                    <strong>Objective:</strong> ${t.instruction}
                </div>

                <div class="editor-section">
                    <label class="editor-label">✏️ Code Editor</label>
                    <div class="editor-info">Write your React logic below (JavaScript/JSX).</div>
                    <div class="editor-wrapper">
                        <textarea id="editor-${i}" class="code-input"></textarea>
                    </div>
                    <div class="editor-status" id="status-${i}"></div>
                </div>

                <div class="solution-box" id="sol-${i}">
                    <div class="solution-title">✓ Best Practice Solution</div>
                    <div class="solution-code">${t.solution}</div>
                    <div class="solution-explanation"><strong>Why:</strong> ${t.explanation}</div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function initializeEditors() {
        tasks.forEach((t, i) => {
            editors[i] = CodeMirror.fromTextArea(document.getElementById(`editor-${i}`), {
                mode: 'javascript',
                theme: 'dracula',
                lineNumbers: true,
                indentUnit: 2,
                lineWrapping: true,
                matchBrackets: true
            });

            editors[i].on('change', (instance) => {
                const lines = instance.lineCount();
                if (lines > 0) {
                    showStatus(i, 'success', `✓ Code registered`);
                } else {
                    clearStatus(i);
                }
            });
        });
    }

    function showStatus(i, type, message) {
        const status = document.getElementById(`status-${i}`);
        status.className = `editor-status show ${type}`;
        status.textContent = message;
    }

    function clearStatus(i) {
        const status = document.getElementById(`status-${i}`);
        status.classList.remove('show');
    }

    function submitCode() {
        const code = editors[current].getValue();
        const lines = code.split('\n').filter(l => l.trim()).length;

        if (lines === 0) {
            showStatus(current, 'error', '❌ Please write some code first');
            return;
        }

        // Show solution
        document.getElementById(`sol-${current}`).classList.add('show');
        document.getElementById('submit-code-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'flex';

        // Update button text if last task
        if (current === tasks.length - 1) {
            const nextBtn = document.getElementById('next-btn');
            nextBtn.textContent = "✓ Finish & Return to Dashboard";
            nextBtn.classList.remove('btn-primary');
            nextBtn.classList.add('btn-success');
            
            nextBtn.onclick = () => {
                localStorage.setItem('react_int_assign_completed', 'true');
                if(typeof scorm !== "undefined"){
                    scorm.set("cmi.core.lesson_status", "completed");
                    scorm.save();
                }
                alert("Congratulations! You have completed the React Intermediate Practical Assignment.");
                window.location.href = '../index.html';
            };
        }

        showStatus(current, 'success', '✓ Great! Review the solution below.');
    }

    function move(dir) {
        // Hide current task
        document.getElementById(`task-${current}`).classList.remove('active');
        clearStatus(current);
        
        // Update index
        current = Math.max(0, Math.min(tasks.length - 1, current + dir));
        
        // Show new task
        document.getElementById(`task-${current}`).classList.add('active');
        
        // UI Updates
        const progress = Math.round(((current + 1) / tasks.length) * 100);
        document.getElementById('progress-text').textContent = `${current + 1} / ${tasks.length}`;
        document.getElementById('progress-fill').style.width = progress + '%';
        document.getElementById('prev-btn').disabled = (current === 0);
        
        // Reset buttons
        document.getElementById('submit-code-btn').style.display = 'flex';
        document.getElementById('next-btn').style.display = 'none';

        // Refresh editor
        setTimeout(() => editors[current].refresh(), 100);
    }
</script>

</body>
</html>
