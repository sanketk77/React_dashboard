<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../scormdriver.js"></script>
    <script src="../APIWrapper.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Advanced — Pre-Assessment</title>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-light: #e8f0fe;
            --primary-dark: #1557b0;
            --success: #1e8e3e;
            --success-light: #f1f8e9;
            --error: #d32f2f;
            --error-light: #ffebee;
            --bg: #f8f9fa;
            --bg-light: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --text-light: #80868b;
            --border: #dadce0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body {
            height: 100%;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .sidebar-logo {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            width: 160px;
            height: auto;
            display: block;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .sidebar-content {
            padding: 30px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .timer-section {
            background: linear-gradient(135deg, var(--primary-light) 0%, #f0f7ff 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .timer-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .timer-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            transition: color 0.3s ease;
        }

        .timer-value.warning {
            color: #f57c00;
        }

        .timer-value.critical {
            color: var(--error);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .answered-section {
            background: linear-gradient(135deg, var(--success-light) 0%, #f1f8e9 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--success);
        }

        .answered-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .answered-count {
            font-size: 24px;
            font-weight: 700;
            color: var(--success);
        }

        .sidebar-nav {
            margin-top: auto;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .sidebar-nav a:hover {
            background: var(--primary-light);
            color: var(--primary);
            transform: translateX(-4px);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
            overflow-y: auto;
            max-width: 900px;
        }

        .header {
            margin-bottom: 40px;
            animation: fadeInDown 0.5s ease;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary-light) 0%, #d2e3fc 100%);
            color: var(--primary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 4px rgba(26, 115, 232, 0.1);
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 16px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-container {
            margin-bottom: 40px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .progress-percentage {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 4px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ===== QUESTION CARD ===== */
        .qcard {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow);
            display: none;
            border: 1px solid var(--border);
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: fadeIn 0.4s ease;
        }

        .qcard.active {
            display: flex;
        }

        .qcard-header {
            margin-bottom: 32px;
        }

        .topic-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: block;
        }

        .qnum {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .qtext {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0;
            line-height: 1.5;
            letter-spacing: -0.3px;
        }

        .qcard-content {
            flex: 1;
        }

        /* ===== OPTIONS ===== */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 28px;
        }

        .opt {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-light);
            position: relative;
            overflow: hidden;
        }

        .opt::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.4s ease;
        }

        .opt:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.15);
        }

        .opt:hover::before {
            left: 100%;
        }

        .opt.selected {
            background: var(--primary-light);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        .olabel {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            background: var(--bg);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .opt.selected .olabel {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3);
        }

        .otext {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.4;
        }

        /* ===== CONTROLS ===== */
        .nav-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        button {
            padding: 12px 28px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--bg-light);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            color: var(--text-main);
        }

        button:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
            font-weight: 700;
        }

        .btn-submit:hover {
            box-shadow: 0 6px 16px rgba(26, 115, 232, 0.4);
            transform: translateY(-2px);
        }

        #submit-row {
            display: none;
        }

        /* ===== RESULTS ===== */
        #results {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .results-header {
            text-align: center;
            padding: 40px;
            background: var(--bg-light);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .results-header h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .score-big {
            font-size: 56px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .results-subtitle {
            font-size: 16px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin: 32px 0;
        }

        .stat-card {
            background: var(--bg-light);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .action-buttons .btn-submit {
            padding: 14px 32px;
            font-size: 15px;
        }

        .review-section {
            margin-top: 40px;
        }

        .review-section h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }

        .review-card {
            background: var(--bg-light);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 5px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .review-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateX(4px);
        }

        .review-card.correct {
            border-left-color: var(--success);
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--success-light) 100%);
        }

        .review-card.incorrect {
            border-left-color: var(--error);
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--error-light) 100%);
        }

        .review-qtext {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .review-item {
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .review-item.correct {
            color: var(--success);
            font-weight: 600;
        }

        .review-item.incorrect {
            color: var(--error);
        }

        .exp-box {
            background: rgba(255,255,255,0.6);
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-sub);
            border-left: 3px solid var(--primary);
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .sidebar {
                width: 260px;
            }

            .main-content {
                margin-left: 260px;
                padding: 30px;
            }

            .header h1 {
                font-size: 28px;
            }

            .qcard {
                padding: 24px;
                min-height: 450px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .sidebar-content {
                flex-direction: row;
                gap: 20px;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
                max-width: 100%;
            }

            .header h1 {
                font-size: 24px;
            }

            .qcard {
                padding: 20px;
                min-height: auto;
            }

            .nav-controls {
                flex-direction: column;
                gap: 12px;
            }

            button {
                width: 100%;
                justify-content: center;
            }

            .result-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .action-buttons .btn-submit {
                width: 100%;
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="jade_logo.webp" alt="Jade Global Logo" class="logo-img">
        </div>
    </div>

    <div class="sidebar-content">
        <div class="timer-section">
            <div class="timer-label">⏱ Time Remaining</div>
            <div id="qtimer" class="timer-value">20:00</div>
        </div>

        <div class="answered-section">
            <div class="answered-label">✓ Answered</div>
            <div class="answered-count" id="ans-num">0 / 20</div>
        </div>

        <nav class="sidebar-nav" style="margin-top: auto;">
            <a href="../index.html">← Exit to Dashboard</a>
        </nav>
    </div>
</div>

<div class="main-content">
    <div id="quiz-ui">
        <div class="header">
            <div class="badge">Module 3: Advanced</div>
            <h1>Advanced Pre-Assessment</h1>
            <p>Evaluate your knowledge of high-scale React patterns and architecture.</p>
        </div>

        <div class="progress-container">
            <div class="progress-info">
                <span class="progress-label">Progress</span>
                <span class="progress-percentage" id="prog-text">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="prog" style="width: 0%"></div>
            </div>
        </div>

        <div id="questions-container"></div>

        <div class="nav-controls">
            <button id="prev-btn" onclick="nav(-1)" disabled>← Previous</button>
            <div id="submit-row">
                <button class="btn-submit" onclick="submitAssessment()">Check My Results →</button>
            </div>
            <button id="next-btn" onclick="nav(1)">Next →</button>
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
const QS = [
    { topic: "State Management", q: "Which Redux middleware is commonly used for handling asynchronous actions?", opts: ["Redux Thunk", "Redux Logger", "React Router", "Zustand"], ans: 0, exp: "Redux Thunk is the standard middleware for logic that interacts with the store asynchronously." },
    { topic: "Next.js & SSR", q: "What is the primary benefit of 'Server-Side Rendering' (SSR)?", opts: ["Better security", "Faster Time to Interactive and SEO", "Smaller bundle sizes", "Easier debugging"], ans: 1, exp: "SSR allows pages to be pre-rendered on the server, significantly improving SEO and initial load speeds." },
    { topic: "Data Fetching", q: "In React Query, what does 'Stale Time' refer to?", opts: ["Time before unmount", "Duration data is 'fresh' before refetch", "Data fetch time", "UI delay"], ans: 1, exp: "Stale time determines how long the data remains valid in the cache before a background update is needed." },
    { topic: "Testing", q: "Which testing library is built into Create React App by default?", opts: ["Cypress", "Selenium", "Jest", "Playwright"], ans: 2, exp: "Jest is the default test runner for most React environments." },
    { topic: "Performance", q: "What is 'Code Splitting' primarily used for?", opts: ["Code formatting", "Reducing initial load time by loading chunks", "Securing API keys", "DB Sync"], ans: 1, exp: "Code splitting breaks the bundle into smaller pieces to speed up initial site loading." },
    { topic: "Next.js & SSR", q: "Which Next.js function is used for Static Site Generation (SSG)?", opts: ["getServerSideProps", "getStaticProps", "useEffect", "useStaticQuery"], ans: 1, exp: "getStaticProps fetches data at build time for high-performance static pages." },
    { topic: "State Management", q: "What is the 'Flux' architecture?", opts: ["CSS Framework", "Unidirectional data flow pattern", "Query language", "Browser engine"], ans: 1, exp: "Flux is the architecture Redux is based on, ensuring data flows in one direction." },
    { topic: "State Management", q: "In Redux, what is the role of a 'Selector'?", opts: ["Change state", "Extract specific pieces of data efficiently", "Trigger API calls", "Style components"], ans: 1, exp: "Selectors are used to query and derive data from the global store." },
    { topic: "React Internals", q: "What does the 'Suspense' component allow you to do?", opts: ["Stop the app", "Show a fallback while waiting for content to load", "Hide errors", "Delete state"], ans: 1, exp: "Suspense lets components 'wait' for something before rendering, usually used with lazy loading." },
    { topic: "Hooks", q: "Which hook provides a way to handle imperative methods with refs?", opts: ["useRef", "useImperativeHandle", "useLayoutEffect", "useCallback"], ans: 1, exp: "useImperativeHandle customizes the instance value exposed to parent components when using refs." },
    { topic: "Next.js & SSR", q: "What is 'Hydration' in Next.js?", opts: ["Code cleaning", "Attaching event listeners to static server HTML", "Image downloading", "DB connecting"], ans: 1, exp: "Hydration turns static HTML from the server into an interactive React app on the client." },
    { topic: "DOM Events", q: "What is the 'Capture' phase in event delegation?", opts: ["Event end", "Phase where event travels down to the target", "Event bubbling", "Render middle"], ans: 1, exp: "Events travel from the root down to the target during the capture phase before bubbling back up." },
    { topic: "Testing", q: "Which library performs unit testing by simulating user interactions?", opts: ["React Testing Library", "Axios", "Mongoose", "Tailwind"], ans: 0, exp: "React Testing Library focuses on testing component behavior from a user's perspective." },
    { topic: "React Patterns", q: "What is a 'Higher-Order Component' (HOC)?", opts: ["List component", "Function taking a component and returning a new one", "Root component", "Prop component"], ans: 1, exp: "HOCs are advanced patterns for reusing component logic." },
    { topic: "Performance", q: "What is 'Tree Shaking'?", opts: ["Folder cleaning", "Removing unused code during the build", "Organizing components", "Testing nested logic"], ans: 1, exp: "Tree shaking ensures only necessary code is included in the production bundle." },
    { topic: "State Management", q: "In Zustand, what is a 'Store'?", opts: ["Physical location", "Central state holder without a Provider", "CSS file", "Fetch hook"], ans: 1, exp: "Zustand stores are standalone hooks that manage state globally." },
    { topic: "React Internals", q: "What is 'Reconciliation' in React?", opts: ["Diffing Virtual DOM with real DOM", "Fixing bugs", "Merging branches", "Updating CSS"], ans: 0, exp: "Reconciliation is the algorithm React uses to update the DOM efficiently." },
    { topic: "Next.js & SSR", q: "Which Next.js feature updates static content without a full rebuild?", opts: ["SSR", "Incremental Static Regeneration (ISR)", "CSR", "Hydration"], ans: 1, exp: "ISR allows you to update specific static pages in the background after deployment." },
    { topic: "Testing", q: "What is the purpose of 'Mock Service Worker' (MSW)?", opts: ["Deployment", "Intercepting and mocking API requests for testing", "Speeding internet", "CSS management"], ans: 1, exp: "MSW mocks actual network requests to ensure tests are reliable and fast." },
    { topic: "Hooks", q: "Which hook measures DOM layout synchronously?", opts: ["useEffect", "useLayoutEffect", "useMemo", "useCallback"], ans: 1, exp: "useLayoutEffect runs synchronously after DOM updates to read layout values." }
];

let current = 0;
let answered = {};
let submitted = false;
let timeLeft = 20 * 60;
let timerInt;


function buildQuestions() {
    const c = document.getElementById('questions-container');
    QS.forEach((q, i) => {
        const d = document.createElement('div');
        d.className = 'qcard' + (i === 0 ? ' active' : '');
        d.id = 'q' + i;
        d.innerHTML = `
            <div class="qcard-header">
                <div class="topic-label">📌 ${q.topic}</div>
                <div class="qnum">Question ${i+1} of ${QS.length}</div>
                <div class="qtext">${q.q}</div>
            </div>
            <div class="qcard-content">
                <div class="options" id="opts${i}">
                    ${q.opts.map((o, j) => `
                        <div class="opt" id="opt${i}_${j}" onclick="selectOpt(${i},${j})">
                            <div class="olabel">${String.fromCharCode(65+j)}</div>
                            <div class="otext">${o}</div>
                        </div>`).join('')}
                </div>
            </div>`;
        c.appendChild(d);
    });
}

function selectOpt(qi, oi) {
    if (submitted) return;
    answered[qi] = oi;
    document.querySelectorAll(`#opts${qi} .opt`).forEach((el, j) => el.classList.toggle('selected', j === oi));
    
    const answeredCount = Object.keys(answered).length;
    document.getElementById('ans-num').textContent = `${answeredCount} / ${QS.length}`;
    
    const progPct = Math.round((answeredCount / QS.length) * 100);
    document.getElementById('prog').style.width = progPct + '%';
    document.getElementById('prog-text').textContent = progPct + '%';
    
    // Only allow submission when all questions are answered per original React logic
    if (answeredCount === QS.length) {
        document.getElementById('submit-row').style.display = 'block';
    }
}

function nav(dir) {
    document.getElementById('q' + current).classList.remove('active');
    current = Math.max(0, Math.min(QS.length - 1, current + dir));
    document.getElementById('q' + current).classList.add('active');
    document.getElementById('prev-btn').disabled = (current === 0);
    document.getElementById('next-btn').disabled = (current === QS.length - 1);
}

function submitAssessment() {
    if(submitted) return;
    submitted = true;
    clearInterval(timerInt);
    localStorage.setItem('react_adv_pre_completed', 'true');
    showResults();
}

function showResults() {
    document.getElementById('quiz-ui').style.display = 'none';
    const r = document.getElementById('results');
    r.style.display = 'block';
    
    let correct = 0;
    QS.forEach((q, i) => { if (answered[i] === q.ans) correct++; });
    const pct = Math.round((correct / QS.length) * 100);

    const timeSpentSec = (20 * 60) - timeLeft;
    const m = Math.floor(timeSpentSec / 60), s = timeSpentSec % 60;
    const timeStr = `${m}:${s < 10 ? '0' : ''}${s}`;

    r.innerHTML = `
        <div class="results-header">
            <h2>🎉 Diagnostic Complete</h2>
            <div class="score-big">${pct}%</div>
            <p class="results-subtitle">Architecture baseline established. Advanced materials are now unlocked.</p>
        </div>

        <div class="result-grid">
            <div class="stat-card">
                <div class="stat-value">${correct}</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: var(--error)">${QS.length - correct}</div>
                <div class="stat-label">Incorrect</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: var(--text-main)">${timeStr}</div>
                <div class="stat-label">Time Taken</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-submit" onclick="window.location.href='adv_content.html'">📚 Go to Learning Content →</button>
        </div>

        <div class="review-section">
            <h3>📋 Review Your Answers</h3>
            ${QS.map((q, i) => {
                const ua = answered[i];
                const ok = ua === q.ans;
                return `
                <div class="review-card ${ok ? 'correct' : 'incorrect'}">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                        <span style="font-size: 18px;">${ok ? '✓' : '✗'}</span>
                        <div class="review-qtext">Question ${i + 1}</div>
                    </div>
                    <div style="font-weight: 600; margin-bottom: 12px; color: var(--text-main);">${q.q}</div>
                    <div class="review-item">Your Answer: <strong>${ua !== undefined ? q.opts[ua] : 'Not answered'}</strong></div>
                    ${!ok ? `<div class="review-item correct">✓ Correct: ${q.opts[q.ans]}</div>` : ''}
                    <div class="exp-box">💡 ${q.exp}</div>
                </div>`;
            }).join('')}
        </div>
    `;
}

function startTimer() {
    timerInt = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        const timerDisplay = document.getElementById('qtimer');
        timerDisplay.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        
        if (timeLeft <= 60) {
            timerDisplay.classList.add('warning');
        }
        if (timeLeft <= 30) {
            timerDisplay.classList.remove('warning');
            timerDisplay.classList.add('critical');
        }
        
        if (timeLeft <= 0) {
            clearInterval(timerInt);
            alert("⏱ Time is up! Submitting your answers...");
            submitAssessment();
        }
    }, 1000);
}

window.onload = function() {
    buildQuestions();
    startTimer();
}
</script>
</body>
</html>
